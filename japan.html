<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩終極自駕 4天3夜</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spot-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 6px solid transparent; }
        .spot-card.active { border-left-color: #3b82f6; background-color: #ffffff; box-shadow: 0 12px 20px -5px rgba(0,0,0,0.1); transform: scale(1.02); }
        
        @media (max-width: 768px) {
            #app { height: 100vh; display: flex; flex-direction: column; }
            #map-view { height: 35vh; position: sticky; top: 0; z-index: 50; flex-shrink: 0; }
            #list-view { height: 65vh; overflow-y: auto; flex-grow: 1; }
        }
        @media (min-width: 769px) {
            #app { height: 100vh; display: flex; }
            #map-view { flex: 1; order: 2; }
            #list-view { width: 450px; order: 1; overflow-y: auto; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="map-view" class="shadow-2xl shadow-blue-900/20"><div id="map"></div></div>

        <div id="list-view" class="bg-slate-50">
            <header class="p-6 border-b sticky top-0 bg-white/90 backdrop-blur-xl z-20">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-2xl font-black text-slate-900 tracking-tighter italic">OKINAWA 2026</h1>
                    <span class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded-full font-bold">自駕精算版</span>
                </div>
                <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-1">
                    <button v-for="n in 4" :key="n" @click="activeDay = n" 
                        :class="['px-5 py-2 rounded-2xl text-sm font-black transition-all whitespace-nowrap', 
                        activeDay === n ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-200']">
                        DAY {{ n }}
                    </button>
                </div>
            </header>

            <div class="p-4 space-y-6">
                <div v-for="(item, index) in currentDayItems" 
                     :key="index" :id="'spot-' + index"
                     class="spot-card p-5 rounded-3xl bg-white/50 border border-slate-100"
                     :data-lat="item.lat" :data-lng="item.lng">
                    
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center space-x-2">
                            <i class="far fa-clock text-blue-500 text-xs"></i>
                            <span class="text-slate-800 text-xs font-black">{{ item.time }}</span>
                        </div>
                        <span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-1 rounded-lg font-bold">停留 {{ item.stay }}</span>
                    </div>

                    <div class="relative w-full h-48 mb-4 overflow-hidden rounded-2xl bg-slate-200 group">
                        <img :src="item.img" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" :alt="item.location" 
                             onerror="this.src='https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=600'">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                        <div class="absolute bottom-4 left-4">
                            <h3 class="text-white text-xl font-black tracking-tight">{{ item.location }}</h3>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-start">
                            <div class="mt-1 mr-3 bg-blue-100 p-1.5 rounded-lg text-blue-600">
                                <i class="fas fa-hiking text-xs"></i>
                            </div>
                            <p class="text-slate-700 text-sm font-bold leading-relaxed">
                                <span class="text-blue-500 mr-1">活動：</span>{{ item.note }}
                            </p>
                        </div>
                        
                        <div class="flex items-center justify-between text-[11px] font-bold border-t border-slate-100 pt-4">
                            <div class="flex items-center text-slate-400">
                                <i class="fas fa-car-side mr-2 text-slate-300"></i>
                                下段車程：<span class="ml-1 text-slate-600">{{ item.drive }}</span>
                            </div>
                            <i class="fas fa-chevron-right text-slate-200"></i>
                        </div>
                    </div>
                </div>
                <div class="h-40"></div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, watch, computed } = Vue;

        createApp({
            setup() {
                const activeDay = ref(1);
                const map = ref(null);
                const markers = ref([]);
                
                const itinerary = ref({
                    1: [
                        { time: '12:20 - 13:45', location: '那霸機場 (取車)', stay: '1.75h', note: '抵達機場並於 13:30 完成取車。', drive: '🚗 15 min', lat: 26.2064, lng: 127.6465, img: 'https://rimage.gnst.jp/livejapan.com/public/article/detail/a/00/03/a0003004/img/basic/a0003004_main.jpg' },
                        { time: '13:45 - 15:30', location: '瀨長島 Umikaji Terrace', stay: '1.75h', note: '吃幸福鬆餅、拍純白階梯海景。', drive: '🚗 20 min', lat: 26.1745, lng: 127.6461, img: 'https://www.umikajiterrace.com/wp-content/uploads/2021/04/main_v.jpg' },
                        { time: '15:50 - 16:50', location: '波上宮', stay: '1h', note: '參拜神社、到沙灘拍懸崖絕景。', drive: '🚗 15 min', lat: 26.2208, lng: 127.6711, img: 'https://www.visitokinawa.jp/wp-content/uploads/2021/10/Naminoue-Shrine_01-1600x900.jpg' },
                        { time: '18:40 - 20:30', location: '目利銀次 (新都心店)', stay: '2h', note: '享受特色木桶建築與鮮魚料理。', drive: '🚗 10 min', lat: 26.2289, lng: 127.6947, img: 'https://img.ltn.com.tw/Upload/playing/page/2018/10/24/181024-11110-1-pMvB9.jpg' },
                        { time: '21:00 - 23:00', location: 'Churasun 6 歌舞秀', stay: '2h', note: '欣賞高人氣主題歌舞秀（必預約）。', drive: '🏠 住宿：那霸市區', lat: 26.2162, lng: 127.6795, img: 'https://www.churasun6.com/common/img/gallery/main01.jpg' }
                    ],
                    2: [
                        { time: '09:30 - 12:30', location: '砂邊潛水 & 浜屋午餐', stay: '3h', note: '潛水體驗、吃軟骨蕎麥麵。', drive: '🚗 15 min', lat: 26.3283, lng: 127.7433, img: 'https://travel.rakuten.com.tw/mytrip/sites/mytrip/files/2021-08/okinawa-diving_06.jpg' },
                        { time: '13:00 - 15:30', location: 'AEON MALL Rycom', stay: '2.5h', note: '1F 寶可夢中心掃貨、逛日系品牌。', drive: '🚗 15 min', lat: 26.3142, lng: 127.7941, img: 'https://www.pokemon.co.jp/gp/pokecen/okinawa/images/main.jpg' },
                        { time: '16:00 - 18:00', location: '美國村 (Sunset Walk)', stay: '2h', note: '傍晚海濱散步、欣賞夕陽美景。', drive: '🚗 0 min (步行即達)', lat: 26.3163, lng: 127.7567, img: 'https://okinawa-labo.com/wp-content/uploads/2016/10/americanvillage-680x454.jpg' },
                        { time: '18:00 - 20:00', location: '琉球之牛 (北谷店)', stay: '2h', note: '就在美國村內，逛完直接吃燒肉。', drive: '🚗 45 min 一路向北', lat: 26.3175, lng: 127.7585, img: 'https://www.u-shi.net/images/top_visual_01_pc.jpg' }
                    ],
                    3: [
                        { time: '09:40 - 12:40', location: '美麗海水族館', stay: '3h', note: '看鯨鯊、漫步海豚劇場區。', drive: '🚗 40 min', lat: 26.6944, lng: 127.8779, img: 'https://churaumi.okinawa/userfiles/files/shisetsu/main_visual01.jpg' },
                        { time: '13:20 - 15:20', location: '古宇利島', stay: '2h', note: '拍大橋、心形岩、午餐吃蝦蝦飯。', drive: '🚗 50 min', lat: 26.7118, lng: 128.0163, img: 'https://rimage.gnst.jp/livejapan.com/public/article/detail/a/00/03/a0003011/img/basic/a0003011_main.jpg' },
                        { time: '16:10 - 17:15', location: '殘波岬燈塔', stay: '1h', note: '登塔看絕美海景與夕陽。', drive: '🚗 15 min', lat: 26.4385, lng: 127.7148, img: 'https://www.visitokinawa.jp/wp-content/uploads/2019/12/Zampamisaki-Lighthouse_04.jpg' },
                        { time: '17:30 - 19:30', location: '百年古家 大家', stay: '2h', note: '端午大餐，阿古豬涮涮鍋 (必預約)。', drive: '🚗 30 min (回中部)', lat: 26.6217, lng: 127.9644, img: 'https://www.ufuya.com/common/images/home/main_visual01.jpg' }
                    ],
                    4: [
                        { time: '09:50 - 11:30', location: '玉泉洞 (沖繩世界)', stay: '1.6h', note: '探索 30 萬年鐘乳石洞窟。', drive: '🚗 20 min', lat: 26.1397, lng: 127.7503, img: 'https://www.gyokusendo.co.jp/okinawaworld/common/images/main_visual_pc.jpg' },
                        { time: '11:50 - 12:50', location: '糸滿魚市場', stay: '1h', note: '品嚐現剖生蠔與肥美海鮮。', drive: '🚗 10 min', lat: 26.1311, lng: 127.6534, img: 'https://rimage.gnst.jp/livejapan.com/public/article/detail/a/00/03/a0003015/img/basic/a0003015_main.jpg' },
                        { time: '13:00 - 14:30', location: 'ASHIBINAA Outlet', stay: '1.5h', note: '登機前最後採買衝刺。', drive: '🚗 15 min 至還車點', lat: 26.1585, lng: 127.6575, img: 'https://www.ashibinaa.com/images/main_visual01.jpg' }
                    ]
                });

                const currentDayItems = computed(() => itinerary.value[activeDay.value]);

                onMounted(() => {
                    map.value = L.map('map', { zoomControl: false }).setView([26.3, 127.8], 11);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map.value);
                    updateMarkers();
                    initScrollObserver();
                    setTimeout(() => map.value.invalidateSize(), 500);
                });

                const updateMarkers = () => {
                    markers.value.forEach(m => map.value.removeLayer(m));
                    markers.value = currentDayItems.value.map(p => 
                        L.marker([p.lat, p.lng]).addTo(map.value).bindPopup(`<div class="font-bold">${p.location}</div>`)
                    );
                    if (markers.value.length) {
                        const group = new L.featureGroup(markers.value);
                        map.value.fitBounds(group.getBounds().pad(0.3));
                    }
                };

                const initScrollObserver = () => {
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const lat = entry.target.getAttribute('data-lat');
                                const lng = entry.target.getAttribute('data-lng');
                                if(map.value) map.value.flyTo([lat, lng], 14, { animate: true });
                                document.querySelectorAll('.spot-card').forEach(el => el.classList.remove('active'));
                                entry.target.classList.add('active');
                            }
                        });
                    }, { threshold: 0.5, rootMargin: '0px 0px -10% 0px' });
                    document.querySelectorAll('.spot-card').forEach(el => observer.observe(el));
                };

                watch(activeDay, () => setTimeout(() => { 
                    updateMarkers(); 
                    initScrollObserver(); 
                    document.querySelector('#list-view').scrollTo({ top: 0, behavior: 'smooth' }); 
                }, 100));

                return { activeDay, currentDayItems };
            }
        }).mount('#app');
    </script>
</body>
</html>
