<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩 2026 終極自駕完整指南</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; margin: 0; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spot-card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); border-left: 6px solid transparent; }
        .spot-card.active { border-left-color: #3b82f6; background-color: #ffffff; box-shadow: 0 12px 20px -5px rgba(0,0,0,0.1); transform: scale(1.02); }
        @media (max-width: 768px) {
            #app { height: 100vh; display: flex; flex-direction: column; }
            #map-view { height: 35vh; position: sticky; top: 0; z-index: 50; flex-shrink: 0; }
            #list-view { height: 65vh; overflow-y: auto; flex-grow: 1; }
        }
        @media (min-width: 769px) {
            #app { height: 100vh; display: flex; }
            #map-view { flex: 1; order: 2; }
            #list-view { width: 450px; order: 1; overflow-y: auto; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="map-view" class="shadow-2xl shadow-blue-900/20"><div id="map"></div></div>
        <div id="list-view" class="bg-slate-50">
            <header class="p-6 border-b sticky top-0 bg-white/90 backdrop-blur-xl z-20">
                <div class="flex justify-between items-center mb-4">
                    <h1 class="text-2xl font-black text-slate-900 tracking-tighter italic">OKINAWA 2026</h1>
                    <span class="text-[10px] bg-emerald-600 text-white px-2 py-1 rounded-full font-bold">端午自駕終極版</span>
                </div>
                <div class="flex space-x-2 overflow-x-auto no-scrollbar pb-1">
                    <button v-for="n in 4" :key="n" @click="activeDay = n" 
                        :class="['px-5 py-2 rounded-2xl text-sm font-black transition-all whitespace-nowrap', 
                        activeDay === n ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-400 border border-slate-200']">
                        DAY {{ n }}
                    </button>
                </div>
            </header>

            <div class="p-4 space-y-6">
                <div v-for="(item, index) in currentDayItems" 
                     :key="index" :id="'spot-' + index"
                     class="spot-card p-5 rounded-3xl bg-white/50 border border-slate-100"
                     :data-lat="item.lat" :data-lng="item.lng">
                    
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center space-x-2">
                            <i class="far fa-clock text-blue-500 text-xs"></i>
                            <span class="text-slate-800 text-xs font-black">{{ item.time }}</span>
                        </div>
                        <span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-1 rounded-lg font-bold">停留 {{ item.stay }}</span>
                    </div>

                    <div class="relative w-full h-48 mb-4 overflow-hidden rounded-2xl bg-slate-200 group">
                        <img :src="item.img" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" :alt="item.location" 
                             onerror="this.src='https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=800'">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent"></div>
                        <div class="absolute bottom-4 left-4">
                            <h3 class="text-white text-xl font-black tracking-tight">{{ item.location }}</h3>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="flex items-start">
                            <div class="mt-1 mr-3 bg-blue-100 p-1.5 rounded-lg text-blue-600">
                                <i class="fas fa-flag text-xs"></i>
                            </div>
                            <p class="text-slate-700 text-sm font-bold leading-relaxed">
                                <span class="text-blue-500 mr-1">焦點：</span>{{ item.note }}
                            </p>
                        </div>
                        <div class="flex items-center justify-between text-[11px] font-bold border-t border-slate-100 pt-4">
                            <div class="flex items-center text-slate-400">
                                <i class="fas fa-car-side mr-2 text-slate-300"></i>
                                下段車程：<span class="ml-1 text-slate-600">{{ item.drive }}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="h-40"></div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, watch, computed } = Vue;

        createApp({
            setup() {
                const activeDay = ref(1);
                const map = ref(null);
                const markers = ref([]);
                
                const itinerary = ref({
                    1: [
                        { time: '13:40 - 14:30', location: '沖宮 (奧武山公園)', stay: '50m', note: '參拜琉球八社之一，感受獨特的能量景點與大自然交融。', drive: '🚗 15 min', lat: 26.2045, lng: 127.6749, img: 'https://cdn.mainichi.jp/vol1/2016/11/04/20161104org00m040003000p/9.jpg' },
                        { time: '14:45 - 16:15', location: '瀨長島 Umikaji Terrace', stay: '1.5h', note: '吃超人氣幸福鬆餅、純白階梯美照，看飛機起降。', drive: '🚗 20 min', lat: 26.1745, lng: 127.6461, img: 'https://www.umikajiterrace.com/wp-content/uploads/2021/04/main_v.jpg' },
                        { time: '16:35 - 17:30', location: '波上宮', stay: '55m', note: '神社參拜買限定御守，步行至海灘拍懸崖神社全景。', drive: '🚗 10 min', lat: 26.2208, lng: 127.6711, img: 'https://www.visitokinawa.jp/wp-content/uploads/2021/10/Naminoue-Shrine_01-1600x900.jpg' },
                        { time: '17:40 - 19:30', location: '國際通 & 那霸 B/C 飯店', stay: '2h', note: '登記入住放行李，開逛國際通土產雜貨與驚安殿堂。⚠️記得買明早早餐！', drive: '🚗 晚餐三選一 (可步行/車程10m)', lat: 26.2120, lng: 127.6800, img: 'https://rimage.gnst.jp/livejapan.com/public/article/detail/a/00/03/a0003009/img/basic/a0003009_main.jpg' }
                    ],
                    2: [
                        { time: '07:45 - 11:30', location: '青之洞窟潛水 (真榮田岬)', stay: '3.5h', note: '08:00 準時下水！享受早晨最清澈夢幻藍洞。結束在岬角簡單午餐。', drive: '🚗 35 min (南回)', lat: 26.4431, lng: 127.7719, img: 'https://img.travelbook.co.jp/images/1131102' },
                        { time: '12:05 - 14:35', location: '港川外人住宅深度遊', stay: '2.5h', note: '拍 UFO 漢堡、體驗 THE FLAVOR DESIGN 調香 (建議預約12:30/13:00)。', drive: '🚗 20 min', lat: 26.2625, lng: 127.7144, img: 'https://www.visitokinawa.jp/wp-content/uploads/2021/10/Minatogawa-Stateside-Town_02-1600x900.jpg' },
                        { time: '14:55 - 17:15', location: 'AEON Rycom (寶可夢)', stay: '2.3h', note: '充裕時間！鎖定 1F 沖繩限定版寶可夢中心瘋狂掃貨。', drive: '🚗 15 min 轉進北谷', lat: 26.3142, lng: 127.7941, img: 'https://www.pokemon.co.jp/gp/pokecen/okinawa/images/main.jpg' },
                        { time: '17:30 - 21:15', location: '北谷公寓(Gold Stay) & 琉球之牛', stay: '3.7h', note: '入住配有洗烘衣機的高級公寓！傍晚美國村夕陽散步，19:15 享用頂級燒肉。', drive: '🏠 住宿：北谷連住', lat: 26.3262, lng: 127.7550, img: 'https://www.u-shi.net/images/top_visual_01_pc.jpg' }
                    ],
                    3: [
                        { time: '09:05 - 13:05', location: '古宇利島 5 站全攻略', stay: '4h', note: '南端展望台 ➔ 跨海大橋 ➔ 海洋塔幸福之鐘 ➔ 心形岩 ➔ 爽吃蝦蝦飯！', drive: '🚗 15 min', lat: 26.7118, lng: 128.0163, img: 'https://okinawa-labo.com/wp-content/uploads/2015/07/04e90897585ec840f0970a7df8544c01.jpg' },
                        { time: '13:20 - 14:00', location: 'Shinmei Coffee (今歸仁)', stay: '40m', note: '島出來剛好順路，來一杯高品質招牌「生黑糖拿鐵」提神。', drive: '🚗 15 min', lat: 26.6908, lng: 127.9422, img: 'https://img.hotpepper.jp/G012/ml_202102/j_hp_G012228514_1.jpg' },
                        { time: '14:15 - 17:30', location: '美麗海水族館', stay: '3.25h', note: '下午時段充裕！悠閒看黑潮之海鯨鯊、海豚表演與漫逛超大禮品店。', drive: '🚗 35 min 前往名護', lat: 26.6944, lng: 127.8779, img: 'https://churaumi.okinawa/userfiles/files/shisetsu/main_visual01.jpg' },
                        { time: '18:05 - 20:05', location: '燒肉乃我那霸 (名護店)', stay: '2h', note: '端午節大餐！老字號名店狂嗑阿古豬（Agu）與山原牛燒肉（務必提前訂位）。', drive: '🚗 50 min 回北谷公寓', lat: 26.5410, lng: 127.9790, img: 'https://www.yanbaru-shimabuta.com/wp-content/themes/ganaha_shinkand_pc/images/top/main_01.jpg' }
                    ],
                    4: [
                        { time: '08:30 - 09:30', location: 'A&W 糸滿店', stay: '1h', note: '經典美式漢堡早餐，招牌 Root Beer 內用無限續杯。', drive: '🚗 20 min', lat: 26.1511, lng: 127.6745, img: 'https://rimage.gnst.jp/livejapan.com/public/article/detail/a/00/01/a0001859/img/basic/a0001859_main.jpg' },
                        { time: '09:50 - 11:30', location: '玉泉洞 (沖繩世界)', stay: '1.6h', note: '探索 30 萬年氣勢磅礡的鐘乳石洞窟、看王國村傳統舞。', drive: '🚗 20 min', lat: 26.1397, lng: 127.7503, img: 'https://www.gyokusendo.co.jp/okinawaworld/common/images/main_visual_pc.jpg' },
                        { time: '11:50 - 12:50', location: '糸滿魚市場', stay: '1h', note: '最後海鮮衝刺：現剖生蠔、炙燒海膽、焗烤龍蝦生魚片爽吃。', drive: '🚗 10 min', lat: 26.1311, lng: 127.6534, img: 'https://okinawa-labo.com/wp-content/uploads/2016/09/848386c91a13e51f88a914392ebbc928.jpg' },
                        { time: '13:00 - 14:30', location: 'ASHIBINAA Outlet', stay: '1.5h', note: '回國前各大品牌折扣最後衝刺採買！', drive: '🚗 15 min 歸還車輛', lat: 26.1585, lng: 127.6575, img: 'https://www.ashibinaa.com/images/main_visual01.jpg' }
                    ]
                });

                const currentDayItems = computed(() => itinerary.value[activeDay.value]);

                onMounted(() => {
                    map.value = L.map('map', { zoomControl: false }).setView([26.3, 127.8], 11);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map.value);
                    updateMarkers();
                    initScrollObserver();
                    setTimeout(() => map.value.invalidateSize(), 500);
                });

                const updateMarkers = () => {
                    markers.value.forEach(m => map.value.removeLayer(m));
                    markers.value = currentDayItems.value.map(p => 
                        L.marker([p.lat, p.lng]).addTo(map.value).bindPopup(`<div class="font-bold">${p.location}</div>`)
                    );
                    if (markers.value.length) {
                        const group = new L.featureGroup(markers.value);
                        map.value.fitBounds(group.getBounds().pad(0.3));
                    }
                };

                const initScrollObserver = () => {
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const lat = entry.target.getAttribute('data-lat');
                                const lng = entry.target.getAttribute('data-lng');
                                if(map.value) map.value.flyTo([lat, lng], 14, { animate: true });
                                document.querySelectorAll('.spot-card').forEach(el => el.classList.remove('active'));
                                entry.target.classList.add('active');
                            }
                        });
                    }, { threshold: 0.5, rootMargin: '0px 0px -10% 0px' });
                    document.querySelectorAll('.spot-card').forEach(el => observer.observe(el));
                };

                watch(activeDay, () => setTimeout(() => { 
                    updateMarkers(); 
                    initScrollObserver(); 
                    document.querySelector('#list-view').scrollTo({ top: 0, behavior: 'smooth' }); 
                }, 100));

                return { activeDay, currentDayItems };
            }
        }).mount('#app');
    </script>
</body>
</html>
